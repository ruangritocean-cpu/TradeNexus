version: '3.8'

services:
  tradenexus-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradenexus_dss
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # Named volume for persistent SQLite journal logs
      - tradenexus-data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src

volumes:
  tradenexus-data:
    driver: local
